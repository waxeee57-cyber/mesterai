project_id = "mesterai"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://mesterai.hu", "mesterai://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.sms]
enable_signup = true
enable_confirmations = true
template = "Az MesterAI kódod: {{ .Code }}"

[auth.sms.twilio]
enabled = false
account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

[functions]
[functions.transcribe-audio]
verify_jwt = true
[functions.generate-quote]
verify_jwt = true
[functions.send-reminder]
verify_jwt = true
[functions.nav-invoice]
verify_jwt = true
[functions.stripe-webhook]
verify_jwt = false
